<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Interativo Moderno - Membrana Plasmática</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* ========================
           🎨 DESIGN & TIPOGRAFIA
           ======================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #0B0B0B;
            color: #F5F5F5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #app-container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .card {
            background-color: #161616;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            transition: opacity 0.3s ease;
        }

        h1, h2 {
            margin-bottom: 24px;
            text-align: center;
            font-weight: 800;
        }

        .question-counter {
            font-size: 0.9rem;
            color: #888;
            text-align: center;
            margin-bottom: 16px;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: #222;
            color: #F5F5F5;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 16px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) {
            background-color: #2A2A2A;
            border-color: #555;
            transform: translateY(-2px);
        }

        .option-btn.correct {
            background-color: #1b5e20 !important;
            border-color: #4caf50 !important;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.4);
            color: #fff;
        }

        .option-btn.wrong {
            background-color: #b71c1c !important;
            border-color: #f44336 !important;
            box-shadow: 0 0 15px rgba(244, 67, 54, 0.4);
            color: #fff;
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* ========================
           🧩 MODAL / POPUP
           ======================== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: #161616;
            padding: 32px;
            border-radius: 16px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-title {
            font-size: 1.5rem;
            margin-bottom: 16px;
            font-weight: 800;
        }

        .text-success { color: #4caf50; }
        .text-danger { color: #f44336; }

        .modal-feedback {
            margin-bottom: 24px;
            line-height: 1.5;
            color: #CCC;
        }

        .modal-explanation {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #333;
            font-size: 0.9rem;
            color: #AAA;
            text-align: left;
        }

        .btn-primary {
            background-color: #F5F5F5;
            color: #0B0B0B;
            border: none;
            padding: 14px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-top: 20px;
        }

        .btn-primary:hover {
            background-color: #DDD;
            transform: translateY(-2px);
        }

        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="quiz-screen" class="card screen active">
            <div class="question-counter" id="question-counter">Questão 1</div>
            <h2 id="question-text">Carregando pergunta...</h2>
            <div class="options-grid" id="options-container"></div>
        </div>

        <div id="result-screen" class="card screen">
            <h2>🎉 Quiz Finalizado!</h2>
            <p style="text-align: center; font-size: 1.2rem; margin-bottom: 10px;">Sua pontuação:</p>
            <h1 id="score-text" style="font-size: 3rem; color: #4caf50;">0/0</h1>
            <p id="score-feedback" style="text-align: center; color: #888; margin-bottom: 32px;">Excelente trabalho!</p>
            <button class="btn-primary" onclick="restartQuiz()">Jogar Novamente</button>
        </div>
    </div>

    <div id="feedback-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modal-title" class="modal-title">Resultado</h3>
            <p id="modal-feedback" class="modal-feedback">A resposta correta era...</p>
            <div id="modal-explanation" class="modal-explanation">Explicação aqui...</div>
            <button class="btn-primary" id="next-btn" onclick="nextQuestion()">Próxima Questão</button>
        </div>
    </div>

    <script>
        /* ========================
           🧠 BANCO DE QUESTÕES
           ======================== */
        const perguntas = [
            // QUESTÕES DE 1 A 15
            {
                pergunta: "A importância das membranas biológicas para o surgimento da vida está diretamente relacionada à sua capacidade de:",
                opcoes: [
                    "Sintetizar proteínas estruturais",
                    "Separar e organizar o conteúdo celular",
                    "Produzir energia metabólica",
                    "Controlar apenas a entrada de água",
                    "Isolar completamente o meio interno"
                ],
                correta: 1,
                explicacao: "O surgimento da membrana foi o passo crítico para a vida porque permitiu a compartimentalização química, separando reações internas do ambiente externo.<br><br>Sem isso, moléculas essenciais seriam diluídas e reações metabólicas não ocorreriam de forma coordenada. Além disso, a membrana permite gradientes químicos e elétricos, base para produção de energia (ex: cadeia respiratória). Ou seja, não é só 'separar', é criar um sistema funcional controlado."
            },
            {
                pergunta: "A permeabilidade seletiva da membrana plasmática significa que ela:",
                opcoes: [
                    "Seleciona quais substâncias entram e saem",
                    "Permite apenas a entrada de água",
                    "Atua apenas em transporte ativo",
                    "Impede completamente a entrada de solutos",
                    "Permite a passagem livre de qualquer substância"
                ],
                correta: 0,
                explicacao: "A permeabilidade seletiva é o que garante homeostase celular.<br><br>A célula precisa manter concentrações internas muito diferentes do meio externo (ex: Na⁺ baixo dentro e K⁺ alto). Se tudo passasse livremente, esses gradientes desapareceriam, comprometendo funções como condução nervosa, contração muscular e equilíbrio osmótico. Logo, seletividade não é detalhe — é condição de sobrevivência."
            },
            {
                pergunta: "A fluidez da membrana plasmática está relacionada principalmente:",
                opcoes: [
                    "À fixação do citoesqueleto",
                    "À mobilidade dos fosfolipídios na bicamada",
                    "À presença de proteínas periféricas",
                    "À ausência de colesterol",
                    "À disposição rígida dos lipídios"
                ],
                correta: 1,
                explicacao: "A fluidez da membrana permite que seus componentes se movam lateralmente, o que é essencial para: redistribuição de proteínas, formação de vesículas, adaptação mecânica.<br><br>Sem essa fluidez, processos como endocitose, divisão celular e até sinalização seriam inviáveis. Além disso, a fluidez é regulada (ex: colesterol), o que mostra que a célula controla ativamente sua própria 'consistência' estrutural."
            },
            {
                pergunta: "A capacity autosselante da membrana é essencial porque permite:",
                opcoes: [
                    "Impedir transporte ativo",
                    "Reduzir comunicação celular",
                    "Evitar perda de material celular após rupturas",
                    "Entrada livre de substâncias",
                    "Aumentar rigidez estrutural"
                ],
                correta: 2,
                explicacao: "A propriedade autosselante decorre da natureza hidrofóbica dos lipídios: quando há ruptura, as moléculas se reorganizam espontaneamente para evitar contato com água.<br><br>Isso é crucial porque evita perda de conteúdo celular, que poderia ser letal. Além disso, permite eventos complexos como fusão de vesículas (exocitose) e formação de novas membranas — ou seja, é essencial para dinâmica celular."
            },
            {
                pergunta: "O glicocálix tem papel importante porque:",
                opcoes: [
                    "Produz ATP",
                    "Atua apenas como reserva energética",
                    "Controla transporte ativo",
                    "Participa do reconhecimento celular",
                    "Está presente apenas em células vegetais"
                ],
                correta: 3,
                explicacao: "O glicocálix funciona como uma 'identidade molecular' da célula.<br><br>Ele permite reconhecimento entre células, importante em processos como resposta imune (identificar 'próprio' vs 'estranho'). Nos grupos sanguíneos ABO, pequenas diferenças nas glicoproteínas já são suficientes para desencadear reações imunológicas graves — mostrando o nível de especificidade envolvido."
            },
            {
                pergunta: "A bicamada lipídica se forma espontaneamente porque os fosfolipídios são:",
                opcoes: [
                    "Insolúveis em água",
                    "Proteicos",
                    "Totalmente hidrofílicos",
                    "Anfipáticos",
                    "Apolares"
                ],
                correta: 3,
                explicacao: "A anfipaticidade dos fosfolipídios (parte hidrofílica + hidrofóbica) faz com que eles se organizem espontaneamente em bicamada em meio aquoso.<br><br>Esse arranjo cria uma barreira natural contra substâncias polares, explicando a seletividade da membrana. Ou seja, a estrutura química dos lipídios define diretamente a função da membrana."
            },
            {
                pergunta: "Proteínas integrais diferem das periféricas porque:",
                opcoes: [
                    "Não possuem função",
                    "São removidas facilmente com água",
                    "Estão fracamente ligadas à membrana",
                    "Não participam de transporte",
                    "Estão inseridas na bicamada lipídica"
                ],
                correta: 4,
                explicacao: "Proteínas integrais estão embutidas na bicamada e frequentemente atravessam toda a membrana, atuando como canais, bombas ou receptores.<br><br>Já as periféricas têm papel mais associado à sinalização e suporte estrutural. Essa diferença estrutural determina suas funções — especialmente no transporte de substâncias."
            },
            {
                pergunta: "A difusão simples ocorre quando:",
                opcoes: [
                    "A substância atravessa a bicamada lipídica",
                    "Ocorre contra o gradiente",
                    "Envolve vesículas",
                    "Há gasto de ATP",
                    "A substância passa por proteínas"
                ],
                correta: 0,
                explicacao: "Na difusão simples, moléculas atravessam diretamente a bicamada lipídica seguindo o gradiente de concentração.<br><br>Isso só é possível para moléculas pequenas e apolares. Esse tipo de transporte é limitado justamente pela natureza hidrofóbica da membrana, o que reforça a necessidade de outros mecanismos para moléculas polares."
            },
            {
                pergunta: "A difusão facilitada diferencia-se da simples porque:",
                opcoes: [
                    "Não depende de concentração",
                    "É exclusiva para gases",
                    "Ocorre contra gradiente",
                    "Utiliza proteínas transportadoras",
                    "Usa ATP"
                ],
                correta: 3,
                explicacao: "A difusão facilitada resolve uma limitação da difusão simples: a passagem de moléculas polares.<br><br>As proteínas transportadoras criam um 'caminho' específico, aumentando eficiência e seletividade. Mesmo sendo passivo, esse processo pode saturar — característica importante em provas."
            },
            {
                pergunta: "O transporte ativo é caracterizado por:",
                opcoes: [
                    "Ocorre contra o gradiente com gasto de ATP",
                    "Não gastar energia",
                    "Não utilizar proteínas",
                    "Ocorre a favor do gradiente",
                    "Ser exclusivo para água"
                ],
                correta: 0,
                explicacao: "O transporte ativo permite que a célula mantenha gradientes contra a tendência natural (difusão).<br><br>Isso exige ATP porque é energeticamente desfavorável. Sem esse mecanismo, a célula rapidamente perderia controle sobre seu ambiente interno."
            },
            {
                pergunta: "A bomba de sódio e potássio é importante porque:",
                opcoes: [
                    "Atua apenas na osmose",
                    "Mantém gradientes iônicos",
                    "Iguala concentrações",
                    "Transporta água",
                    "Remove proteínas"
                ],
                correta: 1,
                explicacao: "A bomba Na⁺/K⁺ é um exemplo clássico de transporte ativo primário e é fundamental para: potencial de membrana, volume celular, excitabilidade celular.<br><br>Ela não apenas transporta íons, mas cria condições para vários outros processos fisiológicos."
            },
            {
                pergunta: "Na osmose, ocorre:",
                opcoes: [
                    "Movimento de água do meio hipertônico para hipotônico",
                    "Difusão de proteínas",
                    "Movimento de soluto",
                    "Transporte ativo",
                    "Movimento de água do meio hipotônico para hipertônico"
                ],
                correta: 4,
                explicacao: "Na osmose, a água se move para equilibrar concentrações de soluto.<br><br>Isso pode gerar efeitos importantes: célula incha (meio hipotônico) ou célula murcha (meio hipertônico). Esse mecanismo está diretamente ligado ao controle do volume celular e equilíbrio hídrico."
            },
            {
                pergunta: "A endocitose é caracterizada por:",
                opcoes: [
                    "Saída de água",
                    "Entrada de material por vesículas",
                    "Transporte passivo",
                    "Difusão simples",
                    "Liberação de substâncias"
                ],
                correta: 1,
                explicacao: "A endocitose permite entrada de materiais grandes que não poderiam atravessar a membrana por difusão.<br><br>É um processo ativo que envolve reorganização da membrana e formação de vesículas — mostrando que a membrana é altamente dinâmica."
            },
            {
                pergunta: "A fagocitose difere da pinocitose porque:",
                opcoes: [
                    "Não utiliza energia",
                    "Engloba partículas sólidas",
                    "Ocorre por difusão",
                    "Não forma vesículas",
                    "É exclusiva de plantas"
                ],
                correta: 1,
                explicacao: "A diferença central está no tipo de material:<br>fagocitose → partículas grandes (ex: bactérias)<br>pinocitose → líquidos e solutos<br><br>A fagocitose tem papel importante na defesa imunológica, enquanto a pinocitose está mais relacionada à absorção celular."
            },
            {
                pergunta: "A perda da permeabilidade seletiva da membrana pode causar:",
                opcoes: [
                    "Produção excessiva de ATP",
                    "Rigidez da célula",
                    "Entrada e saída descontrolada de substâncias",
                    "Aumento da divisão celular",
                    "Aumento da síntese proteica"
                ],
                correta: 2,
                explicacao: "A perda da permeabilidade seletiva leva ao colapso da homeostase celular.<br><br>Íons podem entrar ou sair de forma descontrolada, afetando processos vitais. No caso da hipercalemia, por exemplo, alterações no K⁺ impactam diretamente o potencial elétrico das células, podendo causar arritmias e falhas neuromusculares."
            },
            // QUESTÕES DE 16 A 30
            {
                pergunta: "A presença de colesterol na membrana plasmática exerce um papel mais preciso ao:",
                opcoes: [
                    "Tornar a membrana completamente rígida em baixas temperaturas",
                    "Aumentar uniformemente a fluidez em qualquer temperatura",
                    "Impedir a movimentação lateral de proteínas integrais",
                    "Reduzir variações extremas de fluidez conforme a temperatura",
                    "Aumentar diretamente o transporte ativo de íons"
                ],
                correta: 3,
                explicacao: "O colesterol atua como um regulador dinâmico da fluidez da membrana, funcionando como um 'amortecedor térmico'.<br><br>Em temperaturas elevadas, ele restringe o movimento excessivo dos fosfolipídios, evitando que a membrana fique fluida demais. Em temperaturas baixas, impede o empacotamento rígido dos lipídios, mantendo a membrana funcional.<br>👉 Consequência: garante estabilidade funcional das proteínas de membrana e preserva a permeabilidade seletiva."
            },
            {
                pergunta: "A concentração de solutos não permeáveis aumenta no meio extracelular, o efeito osmótico predominante será:",
                opcoes: [
                    "Difusão de solutos para o meio intracelular",
                    "Saída de água até equilíbrio dinâmico de potencial osmótico",
                    "Entrada de água até equalização absoluta de solutos",
                    "Aumento da permeabilidade da membrana",
                    "Transporte ativo compensatório imediato"
                ],
                correta: 1,
                explicacao: "O aumento de solutos não permeáveis no meio extracelular eleva a osmolaridade externa, tornando o meio hipertônico.<br><br>Isso reduz o potencial hídrico fora da célula, levando à saída de água por osmose.<br>👉 Importante: a água se move até atingir equilíbrio de potencial osmótico, não necessariamente igualdade de concentrações."
            },
            {
                pergunta: "A alta especificidade das proteínas transportadoras decorre principalmente de:",
                opcoes: [
                    "Pressão osmótica local",
                    "Gradientes de concentração mantidos pela célula",
                    "Configuração tridimensional do sítio de ligação",
                    "Presença de ATP no meio intracelular",
                    "Interações inespecíficas com solutos polares"
                ],
                correta: 2,
                explicacao: "A especificidade das proteínas transportadoras é determinada por seu sítio de ligação tridimensional, que reconhece o soluto por complementaridade estrutural e química (carga, polaridade, tamanho).<br><br>👉 Isso é análogo à interação enzima-substrato. Pequenas mutações estruturais podem abolir completamente o transporte."
            },
            {
                pergunta: "O fenômeno de saturação observado na difusão facilitada indica que:",
                opcoes: [
                    "O gradiente de concentração deixa de existir",
                    "Existe um número limitado de proteínas disponíveis para transporte",
                    "O transporte torna-se ativo em altas concentrações",
                    "A difusão simples passa a predominar",
                    "A membrana perde sua permeabilidade seletiva"
                ],
                correta: 1,
                explicacao: "Na difusão facilitada, o transporte depende de proteínas específicas. Como essas proteínas existem em número limitado, o sistema apresenta cinética de saturação (Vmax).<br><br>👉 Quando todos os transportadores estão ocupados, aumentar a concentração do soluto não aumenta mais a taxa de transporte."
            },
            {
                pergunta: "A distinção fundamental entre transporte ativo primário e secundário está no fato de que:",
                opcoes: [
                    "O primário utiliza ATP diretamente, enquanto o secundário depende de gradientes pré-estabelecidos",
                    "Apenas o primário ocorre contra gradiente",
                    "O secundário não envolve proteínas de membrana",
                    "O primário não altera gradientes iônicos",
                    "O secundário ocorre apenas em células especializadas"
                ],
                correta: 0,
                explicacao: "A diferença central está na origem da energia utilizada:<br>Transporte ativo primário → usa ATP diretamente<br>Transporte ativo secundário → utiliza energia armazenada em gradientes iônicos (geralmente Na⁺), previamente gerados por transporte primário.<br><br>👉 Exemplo: absorção de glicose no intestino via cotransporte com sódio."
            },
            {
                pergunta: "A exocitose pode ser considerada um processo ativo porque:",
                opcoes: [
                    "Ocorre sempre contra gradiente de concentração",
                    "Não envolve vesículas intracelulares",
                    "Depende de reorganização de membrana e consumo energético",
                    "É independente de proteínas",
                    "Ocorre apenas em células secretoras"
                ],
                correta: 2,
                explicacao: "A exocitose envolve uma sequência energeticamente custosa: transporte de vesículas pelo citoesqueleto, reconhecimento e ancoragem na membrana, e fusão de membranas (processo altamente regulado).<br><br>👉 Isso exige ATP e proteínas específicas (ex: SNAREs)."
            },
            {
                pergunta: "A presença de aquaporinas altera principalmente:",
                opcoes: [
                    "A direção do fluxo de água",
                    "A concentração de solutos",
                    "A necessidade de ATP na osmose",
                    "O equilíbrio osmótico final",
                    "A velocidade do fluxo de água através da membrana"
                ],
                correta: 4,
                explicacao: "Aquaporinas são canais altamente seletivos que aumentam drasticamente a permeabilidade à água, acelerando o fluxo osmótico.<br><br>👉 Elas não alteram a direção do fluxo nem o equilíbrio osmótico final, apenas aumentam a velocidade de ajuste osmótico."
            },
            {
                pergunta: "A contribuição da bomba Na⁺/K⁺ para o potencial de membrana ocorre porque:",
                opcoes: [
                    "Neutraliza completamente as cargas",
                    "Permite entrada livre de sódio",
                    "Atua apenas na osmose",
                    "Gera desequilíbrio eletroquímico ao transportar íons de forma assimétrica",
                    "Transporta quantidades iguais de íons"
                ],
                correta: 3,
                explicacao: "A bomba Na⁺/K⁺ é eletrogênica, pois transporta íons de forma assimétrica: 3 Na⁺ para fora e 2 K⁺ para dentro.<br><br>👉 Isso gera um gradiente eletroquímico, contribuindo para o potencial de membrana negativo, essencial para a condução nervosa e contração muscular."
            },
            {
                pergunta: "A endocitose mediada por receptor apresenta maior eficiência porque:",
                opcoes: [
                    "Não depende de energia",
                    "Permite internalização inespecífica de substâncias",
                    "Ocorre independentemente de ligantes",
                    "Não envolve membrana plasmática",
                    "Concentra moléculas específicas mesmo em baixa disponibilidade extracelular"
                ],
                correta: 4,
                explicacao: "Na endocitose mediada por receptor, a célula utiliza proteínas específicas para capturar moléculas mesmo em baixas concentrações extracelulares.<br><br>👉 Os receptores concentram ligantes em regiões específicas da membrana. Aplicação: captação de LDL (colesterol)."
            },
            {
                pergunta: "A fluidez da membrana plasmática é resultado da interação entre:",
                opcoes: [
                    "Apenas proteínas integrais",
                    "Temperatura e composição lipídica da membrana",
                    "ATP e transporte ativo",
                    "Gradientes osmóticos",
                    "Apenas temperatura ambiente"

            const currentQuestion = perguntas[currentQuestionIndex];
            
            questionText.textContent = currentQuestion.pergunta;
            questionCounter.textContent = `Questão ${currentQuestionIndex + 1} de ${perguntas.length}`;
            optionsContainer.innerHTML = '';

            currentQuestion.opcoes.forEach((optionText, index) => {
                const button = document.createElement('button');
                button.className = 'option-btn';
                button.textContent = `${letras[index]} ${optionText}`;
                button.onclick = () => handleAnswer(button, index);
                optionsContainer.appendChild(button);
            });
        }

        function handleAnswer(selectedButton, selectedIndex) {
            const currentQuestion = perguntas[currentQuestionIndex];
            const correctIndex = currentQuestion.correta;
            const allButtons = optionsContainer.querySelectorAll('.option-btn');

            allButtons.forEach(btn => btn.disabled = true);

            const isCorrect = (selectedIndex === correctIndex);

            if (isCorrect) {
                selectedButton.classList.add('correct');
                score++;
            } else {
                selectedButton.classList.add('wrong');
                allButtons[correctIndex].classList.add('correct');
            }

            setTimeout(() => {
                const respostaCorretaFormatada = `${letras[correctIndex]} ${currentQuestion.opcoes[correctIndex]}`;
                showModal(isCorrect, respostaCorretaFormatada, currentQuestion.explicacao);
            }, 1000);
        }

        function showModal(isCorrect, correctAnswerText, explicacao) {
            if (isCorrect) {
                modalTitle.textContent = "Acertou! ✅";
                modalTitle.className = "modal-title text-success";
                modalFeedback.innerHTML = `Mandou bem! A resposta é mesmo:<br><strong style="color: #F5F5F5">${correctAnswerText}</strong>`;
            } else {
                modalTitle.textContent = "Errou ❌";
                modalTitle.className = "modal-title text-danger";
                modalFeedback.innerHTML = `Poxa, não foi dessa vez.<br>A resposta correta era:<br><strong style="color: #F5F5F5">${correctAnswerText}</strong>`;
            }

            modalExplanation.innerHTML = `💡 <strong>Explicação:</strong> ${explicacao}`;

            const nextBtn = document.getElementById('next-btn');
            if (currentQuestionIndex === perguntas.length - 1) {
                nextBtn.textContent = "Ver Resultados";
            } else {
                nextBtn.textContent = "Próxima Questão";
            }

            feedbackModal.classList.add('active');
        }

        function nextQuestion() {
            feedbackModal.classList.remove('active');
            currentQuestionIndex++;

            if (currentQuestionIndex < perguntas.length) {
                setTimeout(loadQuestion, 300); 
            } else {
                setTimeout(showFinalResults, 300);
            }
        }

        function showFinalResults() {
            quizScreen.classList.remove('active');
            resultScreen.classList.add('active');

            const scoreText = document.getElementById('score-text');
            const scoreFeedback = document.getElementById('score-feedback');
            
            scoreText.textContent = `${score}/${perguntas.length}`;

            const percentage = score / perguntas.length;
            if (percentage >= 0.9) {
                scoreFeedback.textContent = "Incrível! Você dominou o assunto de verdade!";
            } else if (percentage >= 0.6) {
                scoreFeedback.textContent = "Muito bom! Seus conhecimentos estão bem afiados.";
            } else {
                scoreFeedback.textContent = "Continue praticando! Biologia celular exige dedicação constante.";
            }
        }

        function restartQuiz() {
            initQuiz();
        }

        initQuiz();
    </script>
</body>
</html>
